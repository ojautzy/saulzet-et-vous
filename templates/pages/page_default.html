{% extends "pages/page_base.html" %}

{% block page_content %}
<div class="prose prose-lg max-w-none font-serif">
  {{ page.content|safe }}
</div>

{% if page.documents.exists %}
<div class="mt-8">
  <h2 class="text-2xl font-playfair font-bold text-vert-foret mb-4">Documents</h2>
  {% include "components/document_list.html" with documents=page.documents.all %}
</div>
{% endif %}
{% endblock %}
