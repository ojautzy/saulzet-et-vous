{% extends "notifications/emails/base_email.html" %}

{% block content %}
<p style="margin:0 0 15px 0;">Bonjour {{ recipient.first_name }},</p>

<p style="margin:0 0 15px 0;">
  <strong>{{ author.get_full_name }}</strong> a commenté la sollicitation <strong>« {{ report.title }} »</strong>.
</p>

<div style="background-color:#f5f0e8;border-left:4px solid #C49A2A;padding:12px 16px;margin:15px 0;border-radius:0 4px 4px 0;">
  <p style="margin:0;font-style:italic;">{{ comment.content|truncatechars:200 }}</p>
</div>
{% endblock %}

{% block cta %}
<table role="presentation" cellpadding="0" cellspacing="0" style="margin:20px auto;">
  <tr>
    <td style="background-color:#4A7C28;border-radius:6px;">
      <a href="{{ site_url }}/etvous/{{ report.pk }}/" style="display:inline-block;padding:12px 28px;color:#ffffff;text-decoration:none;font-weight:600;font-size:14px;">
        Voir la discussion
      </a>
    </td>
  </tr>
</table>
{% endblock %}
