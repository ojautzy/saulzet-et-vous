{% extends "notifications/emails/base_email.html" %}

{% block content %}
<p style="margin:0 0 15px 0;">Nouveau message via le formulaire de contact :</p>

<table role="presentation" cellpadding="0" cellspacing="0" style="margin:15px 0;font-size:14px;">
  <tr>
    <td style="padding:4px 12px 4px 0;color:#999;font-weight:600;">Nom</td>
    <td style="padding:4px 0;">{{ name }}</td>
  </tr>
  <tr>
    <td style="padding:4px 12px 4px 0;color:#999;font-weight:600;">Email</td>
    <td style="padding:4px 0;">{{ email }}</td>
  </tr>
  {% if phone %}
  <tr>
    <td style="padding:4px 12px 4px 0;color:#999;font-weight:600;">Téléphone</td>
    <td style="padding:4px 0;">{{ phone }}</td>
  </tr>
  {% endif %}
</table>

<div style="background-color:#f5f0e8;padding:12px 16px;margin:15px 0;border-radius:4px;">
  <p style="margin:0;white-space:pre-wrap;">{{ message_text }}</p>
</div>
{% endblock %}
