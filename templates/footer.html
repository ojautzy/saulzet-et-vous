{% load i18n %}
<footer class="bg-vert-foret text-white mt-auto">
  <div class="max-w-5xl mx-auto px-4 py-8">
    <div class="flex flex-col md:flex-row justify-between items-center gap-4">
      <!-- Logo + tagline -->
      <div class="text-center md:text-left">
        <div class="flex items-center gap-1 justify-center md:justify-start tracking-wide">
          <span class="font-playfair font-black text-lg">Saulzet</span>
          <span class="font-playfair italic text-lg text-terre-claire">&amp;</span>
          <span class="font-playfair font-bold text-lg">Vous</span>
        </div>
        <p class="font-sans text-xs text-white/50 tracking-wider mt-1">
          v{{ PROJECT_VERSION }}
        </p>
      </div>

      <!-- Links -->
      <div class="flex flex-col md:flex-row items-center gap-3 font-sans text-sm tracking-wide">
        <a href="http://saulzet-le-froid.fr" target="_blank" rel="noopener noreferrer"
           class="hover:text-vert-tres-clair transition-colors">
          {% trans "Site de la commune" %}
        </a>
        <span class="hidden md:inline text-white/30">|</span>
        <a href="https://github.com/ojautzy/saulzet-et-vous" target="_blank" rel="noopener noreferrer"
           class="hover:text-vert-tres-clair transition-colors">
          GitHub
        </a>
        <span class="hidden md:inline text-white/30">|</span>
        <a href="#" class="hover:text-vert-tres-clair transition-colors">
          {% trans "Mentions légales" %}
        </a>
      </div>
    </div>

    <div class="border-t border-white/20 mt-6 pt-4 text-center font-sans text-xs text-white/50 tracking-wide">
      &copy; {% now "Y" %} {% trans "Commune de Saulzet-le-Froid" %} — {% trans "Logiciel libre sous licence MIT" %}
    </div>
  </div>
</footer>
