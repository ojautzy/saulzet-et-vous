<div class="space-y-3">
  {% for doc in documents %}
  <a href="{{ doc.file.url }}" target="_blank" rel="noopener noreferrer"
     class="flex items-center gap-4 p-4 bg-white rounded-lg shadow-sm hover:shadow-md transition-shadow">
    <div class="text-red-600 flex-shrink-0">
      <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/>
      </svg>
    </div>
    <div class="flex-1 min-w-0">
      <p class="font-semibold text-vert-foret truncate">{{ doc.title }}</p>
      <p class="text-sm text-gris-pierre">
        {% if doc.date %}{{ doc.date|date:"d/m/Y" }} — {% endif %}
        {{ doc.file_size_display }}
      </p>
    </div>
    {% if doc.category %}<span class="badge bg-creme-fonce text-gris-pierre border-none text-xs flex-shrink-0">{{ doc.category.name }}</span>{% endif %}
  </a>
  {% empty %}
  <p class="text-gris-pierre italic">Aucun document disponible.</p>
  {% endfor %}
</div>
