{% for item in menu_items %}
  <a href="{{ item.page.get_absolute_url }}" class="block py-2 hover:text-vert-tres-clair">{{ item.page.title }}</a>
  {% for child in item.children %}
    <a href="{{ child.get_absolute_url }}" class="block py-2 pl-4 hover:text-vert-tres-clair text-sm">{{ child.title }}</a>
  {% endfor %}
{% endfor %}
